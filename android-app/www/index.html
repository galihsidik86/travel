<!DOCTYPE html>

<head>

<style>

  .spinner { width: 32px; height: 32px; border: 3px solid rgba(212,175,55,0.25); border-top-color: #D4AF37; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

    <div class="brand">Religio <em>Crew</em></div>
